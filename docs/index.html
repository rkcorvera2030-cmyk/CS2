<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Expense Tracker</title>

<!-- 🔥 Clean Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f1f5f9;
    padding: 20px;
    max-width: 900px;
    margin: auto;
    color: #0f172a;
}

h1 {
    font-weight: 800;
    margin-bottom: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 14px;
    margin-bottom: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
}

button {
    padding: 10px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    font-weight: 600;
}

button:hover {
    background: #1d4ed8;
}

.edit-btn {
    background: #f59e0b;
    margin-right: 5px;
}

.del-btn {
    background: #ef4444;
}

#statusBar {
    display: none;
    background: #ef4444;
    color: white;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    margin-bottom: 10px;
}

/* 🔥 TABLE FIX */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    text-align: left;
    padding: 12px;
    font-size: 13px;
    color: #64748b;
}

td {
    padding: 14px 12px;
    border-bottom: 1px solid #e5e7eb;
}

.amount {
    text-align: right;
    font-weight: 700;
}

.actions {
    text-align: center;
}
</style>
</head>

<body>

<div id="statusBar"></div>

<h1>📖 School Expense Tracker</h1>

<div class="card">
    <h3>Set Budget</h3>
    <input type="number" id="budgetInput" placeholder="Enter budget">
    <button onclick="setBudget()">Set Budget</button>
    <p><strong>Current Budget:</strong> ₱<span id="budgetDisplay">0.00</span></p>
</div>

<div class="card">
    <h3>Add Expense</h3>

    <input type="number" id="amount" placeholder="Amount">

    <select id="category">
        <option>Food</option>
        <option>Transport</option>
        <option>Supplies</option>
        <option>Other</option>
    </select>

    <input type="text" id="note" placeholder="Note">

    <button onclick="addExpense()">Add / Update Expense</button>
</div>

<div class="card">
    <h3>Total: ₱<span id="total">0.00</span></h3>

    <table>
        <thead>
            <tr>
                <th>Note</th>
                <th>Category</th>
                <th class="amount">Amount</th>
                <th class="actions">Actions</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let budget = Number(localStorage.getItem("budget")) || 0;
let editIndex = -1;

function showError(msg) {
    let bar = document.getElementById("statusBar");
    bar.innerText = msg;
    bar.style.display = "block";
    setTimeout(() => bar.style.display = "none", 2000);
}

function render() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    let total = 0;

    expenses.forEach((e, i) => {
        total += Number(e.amount);

        list.innerHTML += `
        <tr>
            <td>${e.note}</td>
            <td>${e.category}</td>
            <td class="amount">₱${Number(e.amount).toFixed(2)}</td>
            <td class="actions">
                <button class="edit-btn" onclick="editExpense(${i})">Edit</button>
                <button class="del-btn" onclick="deleteExpense(${i})">Delete</button>
            </td>
        </tr>
        `;
    });

    document.getElementById("total").innerText = total.toFixed(2);
    document.getElementById("budgetDisplay").innerText = budget.toFixed(2);

    if (budget > 0 && total > budget) {
        showError("⚠ Budget exceeded!");
    }
}

function addExpense() {
    let raw = document.getElementById("amount").value;
    let cat = document.getElementById("category").value;
    let note = document.getElementById("note").value || "No note";

    if (!raw || raw <= 0) {
        showError("Enter valid amount!");
        return;
    }

    let amt = parseFloat(raw).toFixed(2);

    if (editIndex === -1) {
        expenses.push({ amount: amt, category: cat, note: note });
    } else {
        expenses[editIndex] = { amount: amt, category: cat, note: note };
        editIndex = -1;
    }

    localStorage.setItem("expenses", JSON.stringify(expenses));

    document.getElementById("amount").value = "";
    document.getElementById("note").value = "";

    render();
}

function editExpense(index) {
    let e = expenses[index];

    document.getElementById("amount").value = e.amount;
    document.getElementById("category").value = e.category;
    document.getElementById("note").value = e.note;

    editIndex = index;
}

function deleteExpense(index) {
    expenses.splice(index, 1);
    localStorage.setItem("expenses", JSON.stringify(expenses));
    render();
}

function setBudget() {
    let val = document.getElementById("budgetInput").value;

    if (!val || val <= 0) {
        showError("Enter valid budget!");
        return;
    }

    budget = Number(parseFloat(val).toFixed(2));
    localStorage.setItem("budget", budget);

    document.getElementById("budgetInput").value = "";

    render();
}

render();
</script>

</body>
</html>
