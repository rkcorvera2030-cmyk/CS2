<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CodeQuest Expense Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>CodeQuest: School Expense Tracker</h1>

<div class="container">

<div class="card">
<h2>Add Expense</h2>

<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">
<input id="category" placeholder="Category (Food, Transport, etc)">
<input id="note" placeholder="Notes">

<button onclick="addExpense()">Add Expense</button>

</div>


<div class="card">

<h2>Expense List</h2>
<ul id="expenseList"></ul>

</div>


<div class="card">

<h2>Reports</h2>

<button onclick="monthlyReport()">Monthly Report</button>
<button onclick="categorySummary()">Category Summary</button>
<button onclick="exportCSV()">Export CSV</button>

<p id="report"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
