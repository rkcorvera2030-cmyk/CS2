<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Expense Tracker</title>
    <style>
        /* --- SLEEK WHITE DESIGN WITH ROUNDED CORNERS --- */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
        }

        .card {
            background: #ffffff;
            padding: 24px;
            /* THE ROUNDED EDGES */
            border-radius: 16px; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .stat-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-label { font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        .stat-val { font-size: 28px; font-weight: 800; color: #2563eb; }

        /* FORM ELEMENTS */
        label { font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 5px; display: block; }
        
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px; /* Rounded inputs */
            background: #fff;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #2563eb; outline: none; }

        button {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: #fff;
            border: none;
            border-radius: 10px; /* Rounded buttons */
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background-color: #1d4ed8; transform: translateY(-1px); }

        /* CUSTOM ERROR BAR */
        #statusBar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: #ef4444;
            color: #fff;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* TABLE LOG */
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
