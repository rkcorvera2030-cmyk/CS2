<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Expense Tracker</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f1f5f9;
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

h1 { margin-bottom: 20px; }

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}

button {
    padding: 10px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
    border-radius: 8px;
}

button:hover { background: #1d4ed8; }

.del-btn { background: red; }
.edit-btn { background: orange; margin-right: 5px; }

#statusBar {
    display: none;
    background: red;
    color: white;
    padding: 10px;
    text-align: center;
    margin-bottom: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<div id="statusBar"></div>

<h1>📖 Expense Tracker</h1>

<div class="card">
    <h3>Set Budget</h3>
    <input type="number" id="budgetInput" placeholder="Enter budget">
    <button onclick="setBudget()">Set Budget</button>
    <p>Current Budget: ₱<span id="budgetDisplay">0</span></p>
</div>

<div class="card">
    <h3>Add Expense</h3>

    <input type="number" id="amount" placeholder="Amount">

    <select id="category">
        <option>Food</option>
        <option>Transport</option>
        <option>Supplies</option>
        <option>Other</option>
    </select>

    <input type="text" id="note" placeholder="Note">

    <button onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
    <h3>Total: ₱<span id="total">0</span></h3>

    <table>
        <thead>
            <tr>
                <th>Note</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let budget = Number(localStorage.getItem("budget")) || 0;
let editIndex = -1;

function showError(msg) {
    let bar = document.getElementById("statusBar");
    bar.innerText = msg;
    bar.style.display = "block";
    setTimeout(() => bar.style.display = "none", 2000);
}

function render() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    let total = 0;

    expenses.forEach((e, i) => {
        total += Number(e.amount);

        list.innerHTML += `
        <tr>
            <td>${e.note}</td>
            <td>${e.category}</td>
            <td>₱${e.amount}</td>
            <td>
                <button class="edit-btn" onclick="editExpense(${i})">Edit</button>
                <button class="del-btn" onclick="deleteExpense(${i})">Delete</button>
            </td>
        </tr>
        `;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("budgetDisplay").innerText = budget;

    if (budget > 0 && total > budget) {
        showError("⚠ Budget exceeded!");
    }
}

function addExpense() {
    let amt = document.getElementById("amount").value;
    let cat = document.getElementById("category").value;
    let note = document.getElementById("note").value || "No note";

    if (!amt || amt <= 0) {
        showError("Enter valid amount!");
        return;
    }

    if (editIndex === -1) {
        expenses.push({ amount: amt, category: cat, note: note });
    } else {
        expenses[editIndex] = { amount: amt, category: cat, note: note };
        editIndex = -1;
    }

    localStorage.setItem("expenses", JSON.stringify(expenses));

    document.getElementById("amount").value = "";
    document.getElementById("note").value = "";

    render();
}

function editExpense(index) {
    let e = expenses[index];

    document.getElementById("amount").value = e.amount;
    document.getElementById("category").value = e.category;
    document.getElementById("note").value = e.note;

    editIndex = index;
}

function deleteExpense(index) {
    expenses.splice(index, 1);
    localStorage.setItem("expenses", JSON.stringify(expenses));
    render();
}

function setBudget() {
    let val = document.getElementById("budgetInput").value;

    if (!val || val <= 0) {
        showError("Enter valid budget!");
        return;
    }

    budget = Number(val);
    localStorage.setItem("budget", budget);

    document.getElementById("budgetInput").value = "";

    render();
}

render();
</script>

</body>
</html>
