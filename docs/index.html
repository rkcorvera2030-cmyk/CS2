<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Expense Tracker</title>
    <style>
        /* --- SLEEK WHITE DESIGN (NO ROUNDED CORNERS) --- */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            color: #1a1a1a;
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 5px solid #2563eb;
            padding-left: 15px;
            margin-bottom: 25px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #d1d5db;
            padding: 20px;
            /* SHARP EDGES ONLY */
            border-radius: 0px; 
            box-shadow: 4px 4px 0px #e5e7eb;
        }

        .stat-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f3f4f6;
        }

        .total-val { font-size: 22px; font-weight: 800; color: #2563eb; }

        /* FORM ELEMENTS */
        label { font-size: 12px; font-weight: bold; text-transform: uppercase; color: #6b7280; }
        
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            border: 1px solid #d1d5db;
            border-radius: 0px; 
            background: #fff;
            font-family: inherit;
        }

        button {
            background-color: #1a1a1a;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* HOVER: Darker/Flat */
        button:hover {
            background-color: #000;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.2);
        }

        /* CUSTOM ERROR BAR */
        #statusBar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #dc2626;
            color: #fff;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            display: none;
