<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_TRACKER_V3</title>
    <style>
        /* THE "NO-FLUFF" BRUTALIST STYLE */
        body {
            font-family: 'Courier New', monospace;
            background-color: #050505;
            color: #00ff41;
            max-width: 800px;
            margin: 0 auto;
            padding: 10px;
        }

        /* GRID LAYOUT: Put everything side-by-side to save space */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .card {
            border: 2px solid #00ff41;
            padding: 15px;
            background: #000;
            margin-bottom: 10px;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 14px;
            background: #00ff41;
            color: #000;
            display: inline-block;
            padding: 2px 5px;
        }

        input, select, button {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #00ff41;
            background: #000;
            color: #00ff41;
            border-radius: 0;
            font-family: inherit;
        }

        button {
            background: #00ff41;
            color: #000;
            font-weight: bold;
            cursor: crosshair;
        }

        button:hover {
            background: #fff;
        }

        #statusBar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #f00;
            color: #fff;
            text-align: center;
            display: none;
            z-index: 9999;
            font-weight: bold;
        }

        ul { list-style: none; padding: 0; margin: 0; }
        li {
            border-bottom: 1px dashed #00ff41;
            padding: 5px 0;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .del-btn { width: auto; padding: 0 5px; background: #300; color: #f00; border: 1px solid #f00; }
    </style>
</head>
<body>

    <div id="statusBar">SYSTEM_ERROR</div>

    <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
        <span>[STATUS: ACTIVE]</span>
        <span>TOTAL_SPENT: <strong id="totalAmount">₱0</strong></span>
        <span>LIMIT: <strong id="budgetDisplay">0</strong></span>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>NEW_ENTRY</h2>
            <input type="number" id="amount" placeholder="AMT">
            <input type="date" id="date">
            <input type="text" id="note" placeholder="MEMO">
            <button onclick="addExpense()">+ EXECUTE</button>
            <hr border="1" style="border-color: #222;">
            <h2>SET_LIMIT</h2>
            <input type="number" id="budgetInput" placeholder="NEW_LIMIT">
            <button onclick="setBudget()">UPDATE</button>
        </div>

        <div class="card">
            <h2>HISTORY_LOG</h2>
            <ul id="expenseList"></ul>
        </div>
    </div>

    <script>
        let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
        let budget = localStorage.getItem("budget") || 0;

        function triggerError(msg) {
            let bar = document.getElementById("statusBar");
            bar.innerText = ">> ALERT: " + msg;
            bar.style.display = "block";
            setTimeout(() => { bar.style.display = "none"; }, 2500);
        }

        function render() {
            let list = document.getElementById("expenseList");
            let total = 0;
            list.innerHTML = "";
            expenses.forEach((e, i) => {
                total += parseFloat(e.amount);
                let li = document.createElement("li");
                li.innerHTML = `<span>₱${e.amount} | ${e.note}</span> <button class="del-btn" onclick="deleteExpense(${i})">X</button>`;
                list.appendChild(li);
            });
            document.getElementById("totalAmount").innerText = "₱" + total;
            document.getElementById("budgetDisplay").innerText = "₱" + budget;
            if (budget > 0 && total > budget) triggerError("LIMIT_EXCEEDED");
        }

        function addExpense() {
            let amt = document.getElementById("amount").value;
            let dt = document.getElementById("date").value;
            let nt = document.getElementById("note").value;
            if (!amt || !dt) return triggerError("MISSING_DATA");
            expenses.push({ amount: amt, date: dt, note: nt });
            localStorage.setItem("expenses", JSON.stringify(expenses));
            render();
            document.getElementById("amount").value = "";
        }

        function setBudget() {
            let b = document.getElementById("budgetInput").value;
            if (!b) return triggerError("NULL_LIMIT");
            budget = b;
            localStorage.setItem("budget", budget);
            render();
        }

        function deleteExpense(i) {
            expenses.splice(i, 1);
            localStorage.setItem("expenses", JSON.stringify(expenses));
            render();
        }

        render();
    </script>
</body>
</html>
