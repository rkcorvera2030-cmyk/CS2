<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>CodeQuest Expense Tracker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>💰 CodeQuest Expense Tracker</h1>
<p>Track your school spending easily</p>
</header>


<div class="dashboard">

<div class="card total-card">
<h2>Total Expenses</h2>
<p id="totalAmount">₱0</p>
</div>

</div>


<div class="container">

<div class="card form-card">

<h2>Add Expense</h2>

<input id="amount" type="number" placeholder="Amount">

<input id="date" type="date">

<select id="category">
<option>Food</option>
<option>Transport</option>
<option>Bills</option>
<option>School</option>
<option>Other</option>
</select>

<input id="note" placeholder="Notes">

<button onclick="addExpense()">Add Expense</button>

</div>



<div class="card list-card">

<h2>Expense List</h2>

<ul id="expenseList"></ul>

</div>



<div class="card report-card">

<h2>Reports</h2>

<button onclick="monthlyReport()">Monthly Report</button>

<button onclick="categorySummary()">Category Summary</button>

<button onclick="exportCSV()">Export CSV</button>

<p id="report"></p>

</div>

</div>


<footer>
<p>CodeQuest Expense Tracker | Cloud Computing Project</p>
</footer>


<script src="script.js"></script>

</body>
</html>
